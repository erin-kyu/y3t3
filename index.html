<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🖥️ SYNTAX</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖥️</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: #e4e1d8;
    --text: #1a1917; --muted: #7a7870; --accent: #2d2c2a;
    --row-h: 44px; --px-hr: 96px; --label-w: 42px;
  }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.25rem 0 4rem; }

  .header { padding: 0 1rem 1.25rem; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* Legend / person filters */
  .legend { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 1rem 1rem; align-items: center; }
  .leg {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    cursor: pointer; transition: all .15s ease;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .leg:hover { border-color: #bbb8ae; color: var(--text); }
  .leg.active { color: var(--text); border-color: transparent; }
  .leg.dimmed { opacity: 0.35; }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .leg-all {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    cursor: pointer; transition: all .15s ease;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .leg-all:hover { border-color: #bbb8ae; color: var(--text); }
  .leg-all.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Day tabs */
  .day-tabs { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; padding: 0 1rem 0.85rem; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .day-tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s ease; white-space: nowrap; }
  .tab:hover { border-color: #bbb8ae; color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Card */
  .card { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .day-title { padding: 11px 1rem; font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg); }

  /* Scroll */
  .scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; cursor: grab; user-select: none; }
  .scroll-wrap:active { cursor: grabbing; }
  .scroll-wrap::-webkit-scrollbar { height: 4px; }
  .scroll-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .grid-inner { display: flex; flex-direction: column; padding: 8px 0 12px; }

  .time-axis { display: flex; margin-left: var(--label-w); margin-bottom: 6px; }
  .tick { flex: 0 0 var(--px-hr); font-size: 10px; font-weight: 500; color: var(--muted); font-family: 'DM Mono', monospace; border-left: 1px solid var(--border); padding-left: 4px; }

  .person-row { display: flex; align-items: center; padding: 4px 0; transition: opacity .2s; }
  .person-row.hidden { display: none; }
  .p-label { flex: 0 0 var(--label-w); font-size: 12px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); padding-left: 12px; }
  .timeline { position: relative; }

  .gl  { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); opacity: 0.7; }
  .ghl { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); opacity: 0.25; }

  .block {
    position: absolute; border-radius: 6px; display: flex; align-items: center;
    padding: 0 7px; font-size: 11px; font-weight: 600; cursor: pointer;
    overflow: hidden; -webkit-tap-highlight-color: transparent; transition: filter .1s;
  }
  .block:active { filter: brightness(0.88); }
  .block .bl-inner { overflow: hidden; white-space: nowrap; width: 100%; }
  .block .bl-room { font-size: 9px; font-weight: 400; opacity: 0.65; margin-left: 3px; }
  .block-async { position: absolute; border-radius: 3px; display: flex; align-items: center; padding: 0 5px; font-size: 9px; font-weight: 500; overflow: hidden; background: #D3D1C7; color: #444441; cursor: pointer; }

  .row-divider { height: 1px; background: var(--border); margin-left: var(--label-w); opacity: 0.5; }

  /* Popup */
  .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 500; align-items: flex-end; justify-content: center; }
  .popup-overlay.open { display: flex; }
  .popup { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; box-shadow: 0 -4px 32px rgba(0,0,0,0.12); }
  .popup-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .popup-course { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .popup-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); margin-top: 8px; }
  .popup-row strong { color: var(--text); font-weight: 500; }
  .popup-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-top: 10px; }
  .badge-online { background: #E6F1FB; color: #185FA5; }
  .badge-lab    { background: #EAF3DE; color: #3B6D11; }
  .badge-async  { background: #F1EFE8; color: #5F5E5A; }
  .popup-close { margin-top: 16px; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; }

  .free-msg { padding: 28px 1rem; font-size: 13px; color: var(--muted); text-align: center; font-style: italic; }
  .hint { font-size: 11.5px; color: var(--muted); font-style: italic; padding: 0 1rem 0.75rem; }
</style>
</head>

  const ap = h < 12 ? 'am' : 'pm';

const DAYS = Object.keys(DATA);
let activeDay = 'Monday';

function hasAny(day){
  return PEOPLE.some(p => activePeople.has(p) && DATA[day][p] && DATA[day][p].length > 0);
}

function showPopup(course, room, timeStr, note){
  document.getElementById('pop-course').textContent = course;
  document.getElementById('pop-time').textContent = timeStr;
  document.getElementById('pop-room').textContent = room;
  const badge = document.getElementById('pop-badge');
  if(note){
    let cls='', label='';
    if(note.includes('Lab')){ cls='badge-lab'; label='🧪 '+note; }
    else if(note.includes('Async')){ cls='badge-async'; label='⏸ '+note; }
    else if(note.includes('Online')){ cls='badge-online'; label='💻 '+note; }
    else { cls='badge-async'; label=note; }
    badge.innerHTML = `<span class="popup-badge ${cls}">${label}</span>`;
  } else { badge.innerHTML=''; }
  document.getElementById('popup-overlay').classList.add('open');
}

function closePopup(e){
  if(!e || e.target===document.getElementById('popup-overlay')){
    document.getElementById('popup-overlay').classList.remove('open');
  }
}

function updateLegendUI(){
  const allActive = activePeople.size === PEOPLE.length;
  document.getElementById('leg-all').classList.toggle('active', allActive);
  PEOPLE.forEach(p => {
    const el = document.getElementById('leg-'+p);
    const isActive = activePeople.has(p);
    el.classList.toggle('active', isActive);
    el.classList.toggle('dimmed', !isActive);
  });
}

function applyFilter(){
  updateLegendUI();
  // Show/hide rows
  PEOPLE.forEach(p => {
    const rows = document.querySelectorAll(`.person-row[data-person="${p}"]`);
    const divs = document.querySelectorAll(`.row-divider[data-person="${p}"]`);
    rows.forEach(r => r.classList.toggle('hidden', !activePeople.has(p)));
    divs.forEach(d => d.classList.toggle('hidden', !activePeople.has(p)));
  });
}

function togglePerson(p){
  if(activePeople.size === PEOPLE.length){
    // Currently all on — switch to solo mode for this person
    activePeople = new Set([p]);
  } else if(activePeople.has(p) && activePeople.size === 1){
    // Tapping the only active one — go back to all
    activePeople = new Set(PEOPLE);
  } else if(activePeople.has(p)){
    activePeople.delete(p);
  } else {
    activePeople.add(p);
  }
  applyFilter();
}

function toggleAll(){
  activePeople = new Set(PEOPLE);
  applyFilter();
}

function render(day){
  document.getElementById('day-title').textContent = day;
  const cal = document.getElementById('cal');

  // Time axis
  let axisHTML = `<div class="time-axis">`;
  for(let h=START; h<=END; h++){
    const lbl = h===12?'12p': h<12?h+'a':(h-12)+'p';
    axisHTML += `<div class="tick">${lbl}</div>`;
  }
  axisHTML += '</div>';

  let rowsHTML = '';
  PEOPLE.forEach((p, i) => {
    const col = COLORS[p];
    const blocks = DATA[day][p]||[];
    const normal = blocks.filter(b=>!b.stack);
    const stacked = blocks.filter(b=>b.stack);
    const hasStack = stacked.length > 0;
    const rowH = hasStack ? 52 : 44;
    const blockH = hasStack ? 22 : 38;

    let lines = '';
    for(let h=START; h<=END; h++){
      lines += `<div class="gl" style="left:${(h-START)*PX_HR}px"></div>`;
      if(h<END) lines += `<div class="ghl" style="left:${(h-START+0.5)*PX_HR}px"></div>`;
    }

    let bHTML = normal.map(bl=>{
      const durPx=(bl.e-bl.s)*PX_HR;
      const hasOverlap=stacked.some(s=>s.s<bl.e&&s.e>bl.s);
      const bh=hasOverlap?blockH:(hasStack?blockH:38);
      let label='';
      if(durPx>=100) label=`${bl.c}<span class="bl-room">${bl.r}</span>`;
      else if(durPx>=48) label=bl.c;
      return `<div class="block" style="left:${px(bl.s)};width:${wpx(bl.s,bl.e)};height:${bh}px;background:${col.bg};color:${col.text};top:3px"
        onclick="showPopup('${bl.c}','${bl.r}','${fmtH(bl.s)} – ${fmtH(bl.e)}','${bl.note||''}')">
        <div class="bl-inner">${label}</div>
      </div>`;
    }).join('');

    bHTML += stacked.map(bl=>{
      const durPx=(bl.e-bl.s)*PX_HR;
      const label=durPx>=48?bl.c:'';
      return `<div class="block-async" style="left:${px(bl.s)};width:${wpx(bl.s,bl.e)};height:14px;top:${blockH+6}px"
        onclick="showPopup('${bl.c}','${bl.r}','${fmtH(bl.s)} – ${fmtH(bl.e)}','${bl.note||''}')">
        ${label}
      </div>`;
    }).join('');

    const hidden = !activePeople.has(p) ? ' hidden' : '';
    rowsHTML += `
      <div class="person-row${hidden}" data-person="${p}" style="height:${rowH}px">
        <div class="p-label">${p}</div>
        <div class="timeline" style="width:${TOTAL_PX}px;height:${rowH}px">
          ${lines}${bHTML}
        </div>
      </div>`;
    if(i < PEOPLE.length-1){
      rowsHTML += `<div class="row-divider${hidden}" data-person="${p}"></div>`;
    }
  });

  cal.innerHTML = `<div class="scroll-wrap"><div class="grid-inner" style="min-width:${TOTAL_PX+42}px">${axisHTML}${rowsHTML}</div></div>`;

  // Mouse drag scroll
  const sw = cal.querySelector('.scroll-wrap');
  let isDown=false, startX=0, scrollLeft=0;
  sw.addEventListener('mousedown',e=>{isDown=true;startX=e.pageX-sw.offsetLeft;scrollLeft=sw.scrollLeft;});
  sw.addEventListener('mouseleave',()=>isDown=false);
  sw.addEventListener('mouseup',()=>isDown=false);
  sw.addEventListener('mousemove',e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-sw.offsetLeft;sw.scrollLeft=scrollLeft-(x-startX);});
}

// Build legend
const legEl = document.getElementById('legend');

// ALL button
const allBtn = document.createElement('div');
allBtn.className = 'leg-all active';
allBtn.id = 'leg-all';
allBtn.textContent = 'ALL';
allBtn.onclick = toggleAll;
legEl.appendChild(allBtn);

// Per-person buttons
PEOPLE.forEach(p => {
  const c = COLORS[p];
  const el = document.createElement('div');
  el.className = 'leg active';
  el.id = 'leg-'+p;
  el.style.borderColor = c.border;
  el.style.background = c.bg+'55';
  el.innerHTML = `<div class="leg-dot" style="background:${c.bg};border:1.5px solid ${c.border}"></div>${p}`;
  el.onclick = () => togglePerson(p);
  legEl.appendChild(el);
});

// Build tabs
const tabsEl = document.getElementById('tabs');
DAYS.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'tab'+(d===activeDay?' active':'');
  btn.textContent = d;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    activeDay = d;
    render(d);
  };
  tabsEl.appendChild(btn);
});

render(activeDay);
</script>
</body>
</html>
